name: CI - Full Pipeline (OSS → ClickHouse → 折线图)

# 手动触发 或 每天凌晨 2:00 UTC 自动运行

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 安装依赖 ──
      - name: Install dependencies
        run: |
          pip install pandas python-dotenv PyYAML oss2 matplotlib requests

      # ── 注入密钥 ──
      - name: Create .env
        run: |
          echo "OSS_ENABLED=true" >> .env
          echo "ALIYUN_OSS_ENDPOINT=${{ secrets.ALIYUN_OSS_ENDPOINT }}" >> .env
          echo "ALIYUN_OSS_BUCKET=${{ secrets.ALIYUN_OSS_BUCKET }}" >> .env
          echo "ALIYUN_ACCESS_KEY_ID=${{ secrets.ALIYUN_ACCESS_KEY_ID }}" >> .env
          echo "ALIYUN_ACCESS_KEY_SECRET=${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}" >> .env
          echo "OSS_PREFIX=price-index-platform" >> .env
          echo "CLICKHOUSE_HOST=${{ secrets.CLICKHOUSE_HOST }}" >> .env
          echo "CLICKHOUSE_PORT=${{ secrets.CLICKHOUSE_PORT }}" >> .env
          echo "CLICKHOUSE_USER=${{ secrets.CLICKHOUSE_USER }}" >> .env
          echo "CLICKHOUSE_PASSWORD=${{ secrets.CLICKHOUSE_PASSWORD }}" >> .env
          echo "CLICKHOUSE_DATABASE=${{ secrets.CLICKHOUSE_DATABASE }}" >> .env

      # ── 运行测试 ──
      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v --tb=short

      # ── 生成数据 → OSS ──
      - name: Generate & upload to OSS
        run: |
          TODAY=$(date +%Y-%m-%d)
          python src/main.py --date $TODAY
        continue-on-error: true

      # ── 导入 ClickHouse ──
      - name: Import to ClickHouse
        run: python import_to_clickhouse.py
        continue-on-error: true

      # ── 生成折线图 ──
      - name: Generate chart
        run: python visualization.py
        continue-on-error: true

      # ── 上传产物 ──
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: price-index-chart
          path: price_index_trend.png
